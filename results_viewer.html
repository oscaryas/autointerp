<style>
  :root{
    --bg:#f7f6f2; --panel:#ffffff; --ink:#1b1b22; --muted:#8c897e; --line:#e7e4dc;
    --user:#0e7490; --assistant:#5b54d6; --tool:#b45309; --ok:#15803d; --err:#b91c1c; --sys:#64748b;

  [data-theme="dark"]{
    --bg:#15161a; --panel:#1d1f25; --ink:#e9e7e0; --muted:#8a8a93; --line:#2c2f37;
    --user:#22d3ee; --assistant:#9b95ff; --tool:#f0a83c; --ok:#52c77a; --err:#ff7676; --sys:#9aa3b2;

  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;
    -webkit-font-smoothing:antialiased;font-feature-settings:"cv11","ss01"}
  .wrap{max-width:940px;margin:0 auto;padding:24px 20px 96px}

  /* Header */
  header{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 88%,transparent);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);margin:0 -20px 0;padding:14px 20px}
  .hrow{max-width:940px;margin:0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:10px;margin-right:auto}
  .brand b{font-size:15px;letter-spacing:-.01em}
  .brand .sub{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .btn{font:inherit;font-size:13px;border:1px solid var(--line);background:var(--panel);color:var(--ink);
    padding:6px 11px;border-radius:8px;cursor:pointer;transition:border-color .15s,background .15s}
  .btn:hover{border-color:var(--muted)}
  .btn:focus-visible{outline:2px solid var(--assistant);outline-offset:2px}
  .search{flex:1;min-width:160px;max-width:320px}
  .search input{width:100%;font:inherit;font-size:13px;padding:6px 11px;border:1px solid var(--line);
    border-radius:8px;background:var(--panel);color:var(--ink)}

  /* Session summary */
  .summary{display:flex;flex-wrap:wrap;gap:10px;margin:22px 0 8px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 14px;box-shadow:var(--shadow)}
  .stat .n{font-family:var(--mono);font-size:18px;font-weight:600;letter-spacing:-.02em}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
  .meta{font-family:var(--mono);font-size:11.5px;color:var(--muted);word-break:break-all;margin:4px 0 18px}
  .meta .k{color:var(--ink)}

  /* Timeline */
  .turn{position:relative;padding:0 0 4px 26px;margin:0 0 4px}
  .turn::before{content:"";position:absolute;left:8px;top:6px;bottom:-4px;width:2px;background:var(--line)}
  .turn:last-child::before{bottom:auto;height:18px}
  .dot{position:absolute;left:2px;top:5px;width:14px;height:14px;border-radius:50%;

  .turn.user .dot{border-color:var(--user)}
  .turn.system .dot{border-color:var(--sys)}
  .role{display:flex;align-items:center;gap:8px;font-size:11px;text-transform:uppercase;

  .turn.assistant .who{color:var(--assistant)} .turn.user .who{color:var(--user)} .turn.system .who{color:var(--sys)}

  .bubble{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;

  .badge.read{color:var(--user);border-color:color-mix(in srgb,var(--user) 30%,var(--line))}
  .badge.write{color:var(--assistant);border-color:color-mix(in srgb,var(--assistant) 30%,var(--line))}
  .gist{font-family:var(--mono);font-size:12px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;

  .rstat.ok{color:var(--ok);background:color-mix(in srgb,var(--ok) 14%,transparent)}
  .rstat.err{color:var(--err);background:color-mix(in srgb,var(--err) 14%,transparent)}
  .tbody{padding:0 12px 12px;border-top:1px solid var(--line)}
  .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:11px 0 5px}
  pre.code{font-family:var(--mono);font-size:12px;background:var(--code-bg);border:1px solid var(--line);
    border-radius:8px;padding:10px 12px;margin:0;overflow:auto;max-height:340px;white-space:pre-wrap;word-break:break-word}
  pre.code.result{white-space:pre}
  .cmd{color:var(--ink)} .cmd::before{content:"$ ";color:var(--tool)}

  /* Todos */
  .todos{list-style:none;margin:0;padding:0}
  .todos li{display:flex;gap:9px;align-items:flex-start;font-size:13px;padding:3px 0}
  .tk{font-family:var(--mono);font-size:11px;margin-top:1px;flex:none;width:74px;text-align:right;color:var(--muted)}
  .tk.done{color:var(--ok)} .tk.prog{color:var(--tool)} .tk.pend{color:var(--muted)}
  .todos li.done span.txt{color:var(--muted);text-decoration:line-through}

  .empty{text-align:center;color:var(--muted);padding:64px 20px;font-size:14px}
  .hidden{display:none!important}
  footer{margin-top:40px;color:var(--muted);font-size:12px;text-align:center}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}

<script>
const $ = (s,r=document)=>r.querySelector(s);
const esc = s => String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const READ_TOOLS=new Set(["Read","Glob","Grep","NotebookRead","BashOutput"]);
const WRITE_TOOLS=new Set(["Write","Edit","NotebookEdit","TodoWrite"]);

/* ---- parse: each line is "[ts] {json}" or just "{json}" ---- */
function parse(text){
  const out=[]; let skipped=0;
  for(const raw of text.split(/\r?\n/)){
    const line=raw.trim(); if(!line) continue;
    let ts=null, body=line;
    const m=line.match(/^\[([^\]]+)\]\s*(\{.*\})\s*$/);
    if(m){ ts=m[1]; body=m[2]; }
    try{ const o=JSON.parse(body); o.__ts=ts; out.push(o); }catch(e){ skipped++; }
  }
  return {entries:out,skipped};
}

/* ---- build turns + result map ---- */
function build(entries){
  const results={};               // tool_use_id -> {content,is_error}
  for(const e of entries){
    if(e.type==="user"){
      for(const b of (e.message?.content||[])){
        if(b.type==="tool_result") results[b.tool_use_id]={content:contentToText(b.content),is_error:b.is_error};
      }
    }
  }
  const turns=[]; let cur=null; const seenUsage=new Set();
  for(const e of entries){
    if(e.type==="system"){ turns.push({kind:"system",ts:e.__ts,data:e}); cur=null; continue; }
    if(e.type==="assistant"){
      const id=e.message?.id||Math.random();
      if(!cur||cur.id!==id){ cur={kind:"assistant",id,ts:e.__ts,blocks:[],tokens:0}; turns.push(cur); }
      for(const b of (e.message?.content||[])) cur.blocks.push(b);
      const u=e.message?.usage;
      if(u&&!seenUsage.has(id)){ seenUsage.add(id); cur.tokens=(u.output_tokens||0); cur.inTok=(u.input_tokens||0)+(u.cache_read_input_tokens||0)+(u.cache_creation_input_tokens||0); }
      continue;
    }
    if(e.type==="user"){
      const blocks=e.message?.content||[];
      const onlyResults=blocks.length>0&&blocks.every(b=>b.type==="tool_result");
      if(onlyResults) continue;   // attached to their tool calls instead
      const text=blocks.filter(b=>b.type==="text"||typeof b==="string").map(b=>typeof b==="string"?b:b.text).join("\n")
                 || contentToText(e.message?.content);
      turns.push({kind:"user",ts:e.__ts,text}); cur=null;
    }
  }
  return {turns,results};
}
function contentToText(c){
  if(c==null) return ""; if(typeof c==="string") return c;
  if(Array.isArray(c)) return c.map(x=>typeof x==="string"?x:(x.text||contentToText(x.content)||"")).join("\n");
  return c.text||"";
}

/* ---- renderers ---- */
function gistFor(name,input){
  if(name==="Bash") return `${esc(input.command||"")}${input.description?` <span class="desc"># ${esc(input.description)}</span>`:""}`;
  if(READ_TOOLS.has(name)) return esc(input.file_path||input.pattern||input.path||JSON.stringify(input));
  if(name==="Write"||name==="Edit") return esc(input.file_path||"");
  if(name==="TodoWrite"){const t=input.todos||[];return esc(`${t.length} items`);}
  const s=JSON.stringify(input); return esc(s.length>80?s.slice(0,80)+"…":s);
}
function badgeClass(name){return READ_TOOLS.has(name)?"read":WRITE_TOOLS.has(name)?"write":"";}

function renderTodos(todos){
  const ks={completed:["done","done","✓"],in_progress:["prog","prog","▶"],pending:["pend","pend","○"]};
  return `<ul class="todos">`+todos.map(t=>{
    const k=ks[t.status]||ks.pending;
    return `<li class="${t.status==="completed"?"done":""}"><span class="tk ${k[1]}">${k[2]} ${esc(t.status.replace("_"," "))}</span><span class="txt">${esc(t.content)}</span></li>`;
  }).join("")+`</ul>`;
}

function renderTool(b,results){
  const name=b.name||"tool", input=b.input||{}, res=results[b.id];
  const open = name==="TodoWrite"; // todos are worth showing by default
  let body="";
  if(name==="TodoWrite"&&input.todos){ body+=`<div class="lbl">Todos</div>${renderTodos(input.todos)}`; }
  else if(name==="Bash"){
    body+=`<div class="lbl">Command</div><pre class="code"><span class="cmd">${esc(input.command||"")}</span></pre>`;
    if(input.description) body+=`<div class="lbl">Why</div><pre class="code">${esc(input.description)}</pre>`;
  } else {
    body+=`<div class="lbl">Input</div><pre class="code">${esc(JSON.stringify(input,null,2))}</pre>`;
  }
  if(res){
    const cls=res.is_error?"err":"ok";
    body+=`<div class="lbl">Result ${res.is_error?"· error":""}</div><pre class="code result">${esc(res.content||"(empty)")}</pre>`;
    var rstat=`<span class="rstat ${cls}">${res.is_error?"error":"✓ result"}</span>`;
  } else { var rstat=`<span class="rstat" style="color:var(--muted)">no result</span>`; }
  return `<details class="tool"${open?" open":""}>
    <summary><span class="chev">▶</span><span class="badge ${badgeClass(name)}">${esc(name)}</span>
      <span class="gist">${gistFor(name,input)}</span>${rstat}</summary>
    <div class="tbody">${body}</div></details>`;
}

function renderTurn(t,results){
  if(t.kind==="system"){
    const d=t.data;
    return wrap("system","init",t.ts,
      `<div class="bubble"><p><b>Session start</b> · model <code>${esc(d.model||"?")}</code> · ${(d.tools||[]).length} tools available · permission <code>${esc(d.permissionMode||"?")}</code></p></div>`);
  }
  if(t.kind==="user"){
    return wrap("user","user",t.ts,`<div class="bubble"><p>${esc(t.text||"")}</p></div>`);
  }
  // assistant
  let inner="";
  for(const b of t.blocks){
    if(b.type==="text"&&b.text.trim()) inner+=`<div class="bubble">${b.text.trim().split(/\n{2,}/).map(p=>`<p>${esc(p)}</p>`).join("")}</div>`;
    else if(b.type==="tool_use") inner+=renderTool(b,results);
  }
  const tok=t.tokens?` · ${t.tokens} out`:"";
  return wrap("assistant","claude",t.ts+tok,inner||`<div class="bubble"><p class="desc">(no content)</p></div>`);
}
function wrap(kind,who,ts,inner){
  return `<div class="turn ${kind}"><span class="dot"></span>
    <div class="role"><span class="who">${esc(who)}</span><span class="ts">${esc(ts||"")}</span></div>${inner}</div>`;
}

/* ---- summary ---- */
function renderSummary(entries,turns,skipped){
  const sys=entries.find(e=>e.type==="system");
  let toolCalls=0,asst=0,outTok=0;
  const times=[];
  for(const t of turns){
    if(t.kind==="assistant"){asst++;outTok+=t.tokens||0;toolCalls+=t.blocks.filter(b=>b.type==="tool_use").length;}
    if(t.__ts||t.ts) times.push(t.ts);
  }
  const stamps=entries.map(e=>e.__ts).filter(Boolean);
  let dur="";
  if(stamps.length>1){
    const a=Date.parse(stamps[0].replace(" UTC","Z").replace(" ","T"));
    const b=Date.parse(stamps[stamps.length-1].replace(" UTC","Z").replace(" ","T"));
    if(!isNaN(a)&&!isNaN(b)){const s=Math.round((b-a)/1000);dur=`${Math.floor(s/60)}m ${s%60}s`;}
  }
  const stats=[["Turns",turns.length],["Assistant",asst],["Tool calls",toolCalls],["Out tokens",outTok.toLocaleString()]];
  if(dur) stats.push(["Span",dur]);
  if(skipped) stats.push(["Unparsed",skipped]);
  $("#summary").innerHTML=stats.map(([l,n])=>`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");
  if(sys){
    $("#meta").innerHTML=`<span class="k">cwd</span> ${esc(sys.cwd||"?")} &nbsp;·&nbsp; <span class="k">session</span> ${esc(sys.session_id||"?")} &nbsp;·&nbsp; <span class="k">version</span> ${esc(sys.claude_code_version||"?")}`;
  } else $("#meta").textContent="";
}

/* ---- app ---- */
let STATE={turns:[],results:{}};
function load(text){
  const {entries,skipped}=parse(text);
  if(!entries.length){ $("#feed").innerHTML=`<div class="empty">No JSON lines found. This viewer expects a Claude Code <code>.jsonl</code> transcript.</div>`; $("#summary").innerHTML="";$("#meta").textContent="";$("#foot").textContent=""; return; }
  const {turns,results}=build(entries);
  STATE={turns,results};
  renderSummary(entries,turns,skipped);
  $("#feed").innerHTML=turns.map(t=>renderTurn(t,results)).join("");
  $("#foot").textContent=`${entries.length} log lines parsed${skipped?` · ${skipped} skipped`:""}`;
  applyFilter();
}
function applyFilter(){
  const q=$("#q").value.trim().toLowerCase();
  for(const el of document.querySelectorAll(".turn")){
    el.classList.toggle("hidden", !!q && !el.textContent.toLowerCase().includes(q));
  }
}
$("#q").addEventListener("input",applyFilter);
$("#expand").onclick=()=>document.querySelectorAll(".tool").forEach(d=>d.open=true);
$("#collapse").onclick=()=>document.querySelectorAll(".tool").forEach(d=>d.open=false);
$("#theme").onclick=()=>{const r=document.documentElement;r.setAttribute("data-theme",r.getAttribute("data-theme")==="dark"?"light":"dark");};
$("#file").addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>load(r.result);r.readAsText(f);});

load($("#sample").textContent);
</script>
